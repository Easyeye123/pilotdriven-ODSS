name: Fix controlled profile chain selection

on:
  push:
    branches:
      - feature/controlled-cdl-depress-library
    paths:
      - "scripts/fix_profile_chain_selection.py"
      - ".github/workflows/fix-profile-chain-selection.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/controlled-cdl-depress-library
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pilotdriven_odss_dashboard/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pilotdriven_odss_dashboard/requirements.txt
          python -m pip install pytest

      - name: Apply nested-profile fix
        run: python scripts/fix_profile_chain_selection.py

      - name: Run focused and existing engine regressions
        run: |
          python -m py_compile pilotdriven_odss_dashboard/app/odss/engines.py
          pytest -q \
            pilotdriven_odss_dashboard/tests/test_controlled_cdl_depress_library.py \
            pilotdriven_odss_dashboard/tests/test_engine_regressions.py

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pilotdriven_odss_dashboard/app/odss/engines.py
          git commit -m "fix: suppress nested depressurisation profiles"
          git push origin HEAD:feature/controlled-cdl-depress-library
