name: Finalize pertinent brief renderer

on:
  push:
    branches:
      - fix/pertinent-brief-editorial-execution
    paths:
      - "scripts/finalize_pertinent_brief.py"
      - ".github/workflows/finalize-pertinent-brief.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pertinent-brief-editorial-execution
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pilotdriven_odss_dashboard/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pilotdriven_odss_dashboard/requirements.txt
          python -m pip install pytest pypdf

      - name: Apply final compatibility patch
        run: python scripts/finalize_pertinent_brief.py

      - name: Run full repository tests
        run: |
          set +e
          pytest -q pilotdriven_odss_dashboard/tests 2>&1 | tee /tmp/pytest.log
          status=${PIPESTATUS[0]}
          echo "$status" > /tmp/pytest-status
          exit 0

      - name: Commit implementation and evidence
        run: |
          mkdir -p validation
          cp /tmp/pytest.log validation/pertinent-brief-full-tests.txt
          cp /tmp/pytest-status validation/pertinent-brief-full-test-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            pilotdriven_odss_dashboard/app/odss/pertinent_brief.py \
            pilotdriven_odss_dashboard/tests/test_vaa.py \
            validation/pertinent-brief-full-tests.txt \
            validation/pertinent-brief-full-test-status.txt
          git commit -m "fix: preserve EDTO and notes in compact pertinent brief"
          git push origin HEAD:fix/pertinent-brief-editorial-execution

      - name: Enforce full test result
        run: exit "$(cat /tmp/pytest-status)"
