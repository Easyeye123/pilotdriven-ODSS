name: Dashboard CI

on:
  push:
    paths:
      - "pilotdriven_odss_dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    paths:
      - "pilotdriven_odss_dashboard/**"
      - ".github/workflows/dashboard-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pilotdriven_odss_dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pilotdriven_odss_dashboard/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Compile source
        run: python -m compileall -q app
      - name: Run tests
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest.log
      - name: Build production Docker image
        run: docker build --tag pilotdriven-odss-ci .
      - name: Generate visual briefing samples
        run: python tests/generate_visual_samples.py
      - name: Upload visual briefing samples
        uses: actions/upload-artifact@v4
        with:
          name: visual-briefing-samples
          path: pilotdriven_odss_dashboard/visual-samples/*.pdf
          if-no-files-found: error
      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-test-diagnostics
          path: pilotdriven_odss_dashboard/pytest.log
          if-no-files-found: ignore
