name: ODSS v0.6 handoff bundle

on:
  push:
    branches:
      - feature/v0.6-pilotdriven-handoff
    paths:
      - "integration/v0.6/**"
      - "docs/**"
      - "HANDOFF_MANIFEST.md"
      - "README.md"
      - "pilotdriven_odss_dashboard/README.md"
      - "pilotdriven_odss_dashboard/.env.example"
      - "pilotdriven_odss_dashboard/CHANGELOG.md"
      - ".github/workflows/v06-handoff-bundle.yml"
  pull_request:
    paths:
      - "integration/v0.6/**"
      - "docs/**"
      - "HANDOFF_MANIFEST.md"
      - "README.md"
      - "pilotdriven_odss_dashboard/README.md"
      - "pilotdriven_odss_dashboard/.env.example"
      - "pilotdriven_odss_dashboard/CHANGELOG.md"
      - ".github/workflows/v06-handoff-bundle.yml"
  workflow_dispatch:

jobs:
  validate-and-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pilotdriven_odss_dashboard/requirements-dev.txt
            integration/v0.6/reference/requirements-map.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pilotdriven_odss_dashboard/requirements-dev.txt
          python -m pip install -r integration/v0.6/reference/requirements-map.txt

      - name: Compile source
        run: |
          python -m compileall -q pilotdriven_odss_dashboard/app
          python -m compileall -q integration/v0.6/reference/odss_map_v06

      - name: Test working dashboard
        working-directory: pilotdriven_odss_dashboard
        run: pytest -q

      - name: Test v0.6 reference package
        working-directory: integration/v0.6/reference
        env:
          PYTHONPATH: .
        run: pytest -q

      - name: Build complete handoff archive
        run: |
          mkdir -p dist/pilotdriven-odss-v0.6-handoff
          rsync -a \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache' \
            --exclude 'pilotdriven_odss_dashboard/data' \
            --exclude 'pilotdriven_odss_dashboard/visual-samples' \
            ./ dist/pilotdriven-odss-v0.6-handoff/
          cd dist
          zip -qr pilotdriven-odss-v0.6-handoff.zip pilotdriven-odss-v0.6-handoff
          sha256sum pilotdriven-odss-v0.6-handoff.zip > pilotdriven-odss-v0.6-handoff.zip.sha256

      - name: Upload handoff bundle
        uses: actions/upload-artifact@v4
        with:
          name: pilotdriven-odss-v0.6-handoff
          path: |
            dist/pilotdriven-odss-v0.6-handoff.zip
            dist/pilotdriven-odss-v0.6-handoff.zip.sha256
          if-no-files-found: error
          retention-days: 90
