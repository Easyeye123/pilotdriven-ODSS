name: Apply pertinent brief editorial execution

on:
  push:
    branches:
      - fix/pertinent-brief-editorial-execution
    paths:
      - "scripts/apply_pertinent_brief_editorial.py"
      - ".github/workflows/apply-pertinent-brief-editorial.yml"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/apply_pertinent_brief_editorial.py"
      - ".github/workflows/apply-pertinent-brief-editorial.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pertinent-brief-editorial-execution
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pilotdriven_odss_dashboard/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pilotdriven_odss_dashboard/requirements.txt
          python -m pip install pytest pypdf

      - name: Apply renderer integration patch
        run: python scripts/apply_pertinent_brief_editorial.py

      - name: Capture compile and reporting regressions
        run: |
          set +e
          {
            python -m py_compile \
              pilotdriven_odss_dashboard/app/odss/pertinent_brief.py \
              pilotdriven_odss_dashboard/app/odss/briefing.py \
              pilotdriven_odss_dashboard/app/odss/reporting.py && \
            pytest -q pilotdriven_odss_dashboard/tests/test_reporting_regressions.py
          } 2>&1 | tee /tmp/pertinent-brief-tests.log
          status=${PIPESTATUS[0]}
          echo "$status" > /tmp/pertinent-brief-test-status
          exit 0

      - name: Commit integrated renderer and validation evidence
        run: |
          mkdir -p validation
          cp /tmp/pertinent-brief-tests.log validation/pertinent-brief-editorial-tests.txt
          cp /tmp/pertinent-brief-test-status validation/pertinent-brief-editorial-test-status.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --check
          git add \
            pilotdriven_odss_dashboard/app/odss/pertinent_brief.py \
            pilotdriven_odss_dashboard/app/odss/briefing.py \
            pilotdriven_odss_dashboard/app/odss/reporting.py \
            pilotdriven_odss_dashboard/tests/test_reporting_regressions.py \
            validation/pertinent-brief-editorial-tests.txt \
            validation/pertinent-brief-editorial-test-status.txt
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "fix: enforce pertinent brief editorial protocol"
            git push origin HEAD:fix/pertinent-brief-editorial-execution
          fi

      - name: Enforce reporting regression result
        run: exit "$(cat /tmp/pertinent-brief-test-status)"
