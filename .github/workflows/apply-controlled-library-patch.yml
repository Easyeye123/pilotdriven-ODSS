name: Apply controlled CDL and depressurisation patch

on:
  push:
    branches:
      - feature/controlled-cdl-depress-library
    paths:
      - "scripts/apply_controlled_library_patch.py"
      - ".github/workflows/apply-controlled-library-patch.yml"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/apply_controlled_library_patch.py"
      - ".github/workflows/apply-controlled-library-patch.yml"
      - "pilotdriven_odss_dashboard/app/odss/controlled_library.py"
      - "pilotdriven_odss_dashboard/tests/test_controlled_cdl_depress_library.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/controlled-cdl-depress-library
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pilotdriven_odss_dashboard/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pilotdriven_odss_dashboard/requirements.txt
          python -m pip install pytest

      - name: Apply reviewed engine patch
        run: python scripts/apply_controlled_library_patch.py

      - name: Capture syntax and focused regression evidence
        run: |
          mkdir -p validation/controlled-library
          set +e
          {
            python -m py_compile \
              pilotdriven_odss_dashboard/app/odss/controlled_library.py \
              pilotdriven_odss_dashboard/app/odss/constants.py \
              pilotdriven_odss_dashboard/app/odss/engines.py
            pytest -q \
              pilotdriven_odss_dashboard/tests/test_controlled_cdl_depress_library.py \
              pilotdriven_odss_dashboard/tests/test_engine_regressions.py
          } 2>&1 | tee validation/controlled-library/pytest.txt
          status=${PIPESTATUS[0]}
          echo "$status" > validation/controlled-library/pytest.exitcode
          exit 0

      - name: Commit patched implementation and validation evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git diff --check
          git add \
            pilotdriven_odss_dashboard/app/odss/controlled_library.py \
            pilotdriven_odss_dashboard/app/odss/engines.py \
            validation/controlled-library/pytest.txt \
            validation/controlled-library/pytest.exitcode
          if git diff --cached --quiet; then
            echo "No engine changes to commit"
          else
            git commit -m "feat: integrate controlled CDL and depressurisation indexes"
            git push origin HEAD:feature/controlled-cdl-depress-library
          fi

      - name: Enforce regression result after publishing evidence
        run: test "$(cat validation/controlled-library/pytest.exitcode)" = "0"
