name: Bootstrap WSSS surface NOTAM POC

on:
  push:
    branches:
      - feature/v0.7-wsss-surface-notam-poc
    paths:
      - "integration/v0.7/wsss-surface-poc-bootstrap.part-*"
      - ".github/workflows/bootstrap-wsss-surface-poc.yml"
  pull_request:
    branches:
      - main
    paths:
      - "integration/v0.7/wsss-surface-poc-bootstrap.part-*"
      - ".github/workflows/bootstrap-wsss-surface-poc.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack-fetch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/v0.7-wsss-surface-notam-poc
          fetch-depth: 0

      - name: Detect staged implementation bundle
        id: bundle
        shell: bash
        run: |
          if compgen -G "integration/v0.7/wsss-surface-poc-bootstrap.part-*" > /dev/null; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble and unpack reviewed implementation bundle
        if: steps.bundle.outputs.present == 'true'
        run: |
          cat integration/v0.7/wsss-surface-poc-bootstrap.part-* > /tmp/wsss-surface-poc.b64
          base64 --decode /tmp/wsss-surface-poc.b64 > /tmp/wsss-surface-poc.tar.gz
          tar -tzf /tmp/wsss-surface-poc.tar.gz >/dev/null
          tar -xzf /tmp/wsss-surface-poc.tar.gz -C .
          rm -f integration/v0.7/wsss-surface-poc-bootstrap.part-*
          rm -f integration/v0.7/wsss-surface-poc-bootstrap.tar.gz.b64
          rm -f .github/workflows/wsss-surface-poc.yml

      - uses: actions/setup-python@v5
        if: steps.bundle.outputs.present == 'true'
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: integration/v0.7/wsss-surface-poc/requirements-dev.txt

      - name: Install dependencies
        if: steps.bundle.outputs.present == 'true'
        working-directory: integration/v0.7/wsss-surface-poc
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Fetch bounded versioned WSSS OSM snapshot
        if: steps.bundle.outputs.present == 'true'
        working-directory: integration/v0.7/wsss-surface-poc
        run: python scripts/fetch_wsss_osm.py

      - name: Run deterministic and real-snapshot regression tests
        if: steps.bundle.outputs.present == 'true'
        working-directory: integration/v0.7/wsss-surface-poc
        run: |
          mkdir -p validation
          pytest -q 2>&1 | tee validation/pytest.txt
          echo "0" > validation/pytest.exitcode

      - name: Build sample surface-map contract
        if: steps.bundle.outputs.present == 'true'
        working-directory: integration/v0.7/wsss-surface-poc
        run: |
          python scripts/build_sample_contract.py 2>&1 | tee validation/sample-contract.txt
          echo "0" > validation/sample-contract.exitcode

      - name: Commit proof of concept and validation evidence
        if: steps.bundle.outputs.present == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api/SURFACE_MAP_CONTRACT_V1.md
          git add docs/architecture/ADR-007-osm-airport-surface-geometry.md
          git add integration/v0.7/wsss-surface-poc
          git add -u integration/v0.7
          git commit -m "feat: add WSSS OSM surface NOTAM proof of concept"
          git push origin HEAD:feature/v0.7-wsss-surface-notam-poc
